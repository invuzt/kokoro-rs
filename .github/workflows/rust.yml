name: Build for Termux

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Cache untuk Cargo
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # 2. Install Zig secara manual (Lebih stabil daripada action pihak ketiga)
      - name: Install Zig
        run: |
          wget https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz
          tar -xf zig-linux-x86_64-0.13.0.tar.xz
          echo "$PWD/zig-linux-x86_64-0.13.0" >> $GITHUB_PATH

      # 3. Setup Rust toolchain
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      # 4. Install cargo-zigbuild
      - name: Install cargo-zigbuild
        run: pip3 install cargo-zigbuild

      # 5. Build
      - name: Build for Android/Termux
        run: |
          # Dapatkan path sistem target dari zig
          TARGET_TRIPLE=aarch64-linux-android
          # Mengatur argumen tambahan agar bindgen menemukan stdio.h
          export BINDGEN_EXTRA_CLANG_ARGS="--sysroot=$(zig env | grep -o '/.*' | head -n1)/lib/libc/include"
          
          # Jalankan build
          cargo zigbuild --release --target $TARGET_TRIPLE


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kokoro-cli-termux
          path: target/aarch64-linux-android/release/kokoro-cli
